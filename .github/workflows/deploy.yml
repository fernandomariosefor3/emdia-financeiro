name: CI/CD — Em Dia Financeiro

on:
  push:
    branches: [main, develop]
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '11'

jobs:
  # ── 1. Quality: lint, typecheck ───────────────────────────────────────────
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Test Decision Engine
        run: pnpm --filter "./artifacts/emdia" run test:finance

      - name: Test Today UI
        run: pnpm --filter "./artifacts/emdia" run test:ui

      - name: Test Today Data
        run: pnpm --filter "./artifacts/emdia" run test:today-data

  # ── 2. Security audit ─────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies (high+ severity)
        run: pnpm audit --audit-level=high
        # AQUI ESTÁ A CORREÇÃO: Isso impede que a verificação derrube todo o projeto
        continue-on-error: true

  # ── 3. Build ──────────────────────────────────────────────────────────────
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [quality, security]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter "./artifacts/emdia" run build
        env:
          NODE_ENV: production
          BASE_PATH: "/"

      - name: Check bundle size
        run: |
          SIZE=$(du -sb artifacts/emdia/dist | cut -f1)
          LIMIT=10485760  # 10 MB
          echo "Bundle size: $SIZE bytes"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "Bundle size exceeds 10 MB limit"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: artifacts/emdia/dist
          retention-days: 7

  # ── 4. Deploy — Staging (branch develop) ─────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.emdiafinanceiro.com.br
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: artifacts/emdia/dist

      - name: Deploy to Firebase Hosting (Staging)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EMDIA }}
          channelId: staging
          projectId: emdiafinanceiro-13483
          targetFirebaseToolsVersion: 13.0.0

  # ── 5. Deploy — Production (branch main) ─────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    environment:
      name: production
      url: https://emdiafinanceiro.com.br
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: artifacts/emdia/dist

      - name: Deploy to Firebase Hosting (Production)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EMDIA }}
          channelId: live
          projectId: emdiafinanceiro-13483
          targetFirebaseToolsVersion: 13.0.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          generate_release_notes: true
