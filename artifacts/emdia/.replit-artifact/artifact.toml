kind = "web"
previewPath = "/"
title = "emdia — Controle Financeiro"
version = "1.0.0"
id = "artifacts/emdia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21405

[services.development]
run = "pnpm --filter @workspace/emdia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/emdia", "run", "build" ]
publicDir = "artifacts/emdia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21405"
BASE_PATH = "/"
