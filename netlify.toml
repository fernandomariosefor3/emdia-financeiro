[build]
  base = "artifacts/emdia"
  command = "corepack enable && corepack prepare pnpm@11 --activate && pnpm install && pnpm run build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--version"
  PORT = "3000"
  BASE_PATH = "/"

# SPA routing — redireciona todas as rotas para index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
